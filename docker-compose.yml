version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres.lmtxruivxlhvxrilruiv:Anubhav8789@aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?sslmode=require
    env_file:
      - ./apps/backend/.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
      - ./uploads:/app/uploads

  worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres.lmtxruivxlhvxrilruiv:Anubhav8789@aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?sslmode=require
    env_file:
      - ./apps/backend/.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
      - ./uploads:/app/uploads
    command: python -m celery -A app.core.celery_app worker --loglevel=info
